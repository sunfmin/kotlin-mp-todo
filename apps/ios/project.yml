name: iosApp
options:
  bundleIdPrefix: com.example.todo
  deploymentTarget:
    iOS: "15.0"
  createIntermediateGroups: true

settings:
  base:
    # The UiCompose.framework is produced by the Gradle prebuild script below.
    FRAMEWORK_SEARCH_PATHS:
      - $(inherited)
      - $(SRCROOT)/../../ui-compose/build/xcode-frameworks/$(CONFIGURATION)/$(SDK_NAME)
    OTHER_LDFLAGS:
      - $(inherited)
      - -framework
      - UiCompose
    # Kotlin/Native's Gradle script phase writes outside the sandbox.
    ENABLE_USER_SCRIPT_SANDBOXING: NO

targets:
  iosApp:
    type: application
    platform: iOS
    sources:
      - path: iosApp
    info:
      path: iosApp/Info.plist
      properties:
        CFBundleDisplayName: Collaborative Todo
        # Required by Compose Multiplatform on iOS (high-refresh-rate check).
        CADisableMinimumFrameDurationOnPhone: true
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        # Allow cleartext http to localhost during development.
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.todo.iosApp
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: ""
    preBuildScripts:
      - name: Compile & embed Kotlin framework
        basedOnDependencyAnalysis: false
        script: |
          export JAVA_HOME=/Library/Java/JavaVirtualMachines/temurin-21.jdk/Contents/Home
          cd "$SRCROOT/../.."
          ./gradlew :ui-compose:embedAndSignAppleFrameworkForXcode
